<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 80px 20px;
      gap: 120px;
      color: #fff;
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: -40px;
      background: linear-gradient(to right, #fff, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .stack-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .stack-title {
      font-size: 24px;
      font-weight: 600;
      color: #888;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .canvas {
      position: relative;
      width: 860px;
      height: 540px;
    }

    .node {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 20px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      z-index: 10;
    }

    .node-icon {
      height: 24px;
      display: flex;
      align-items: center;
    }

    .node-icon svg {
      width: 100%;
      height: 100%;
      max-width: 75px;
    }

    .node-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .node-label {
      font-size: 11px;
      font-weight: 600;
      color: #ccc;
      text-align: center;
      line-height: 1.3;
      padding: 0 6px;
    }

    svg.connections {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }
  </style>
</head>

  <script>
    function renderStack(svgId, nodes, connections, stackIndex) {
      const svg = document.getElementById(svgId);
      svg.innerHTML = '';

      // Defs
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      let defsHTML = '';

      connections.forEach((conn, i) => {
        const f = nodes[conn.from];
        const t = nodes[conn.to];
        if (!f || !t) return;

        // Control point for curve
        const mx = (f.x + t.x) / 2;
        const my = (f.y + t.y) / 2;
        const dx = t.x - f.x;
        const dy = t.y - f.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        const cx = mx + (dy / len) * 30;
        const cy = my - (dx / len) * 30;

        const pathData = `M${f.x},${f.y} Q${cx},${cy} ${t.x},${t.y}`;
        const pathId = `path_${stackIndex}_${i}`;

        defsHTML += `<path id="${pathId}" d="${pathData}" fill="none"/>`;
      });

      defs.innerHTML = defsHTML;
      svg.appendChild(defs);

      // Draw paths and dots
      connections.forEach((conn, i) => {
        const f = nodes[conn.from];
        const t = nodes[conn.to];
        if (!f || !t) return;

        const mx = (f.x + t.x) / 2;
        const my = (f.y + t.y) / 2;
        const dx = t.x - f.x;
        const dy = t.y - f.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        const cx = mx + (dy / len) * 30;
        const cy = my - (dx / len) * 30;
        const pathData = `M${f.x},${f.y} Q${cx},${cy} ${t.x},${t.y}`;

        // Static path line
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', conn.color);

        svg.appendChild(dot);
      });
